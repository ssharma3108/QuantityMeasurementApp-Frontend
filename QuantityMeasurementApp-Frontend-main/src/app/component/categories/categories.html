<a
  class="flex flex-col items-center p-6 bg-white rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition-all hover:-translate-y-1 group"
>
  <div
    class="w-12 h-12 rounded-full flex items-center justify-center mb-4 {{
      data.color
    }} group-hover:scale-110 transition-transform"
  >
    <mat-icon>{{ data.icon }}</mat-icon>
  </div>
  <span class="font-medium text-gray-900">{{ data.name }}</span>
</a>
